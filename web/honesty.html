<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Negotiator — Honesty Polygraph</title>
<style>
  :root {
    --bg: #030507; --card: #0c1118; --border: #1b2430;
    --green: #22ff88; --red: #ff3b5c; --amber: #ffb347;
    --text: #e8f0f5; --muted: #5a6b7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "SF Mono", "JetBrains Mono", monospace;
    min-height: 100vh; padding: 2.5rem;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(34,255,136,0.05), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(6,182,212,0.06), transparent 40%);
  }
  .header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 2rem; }
  .header h1 { font-size: 1.5rem; letter-spacing: 0.08em; }
  .header h1 span { color: var(--green); }
  .layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }
  .gauge-panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.8rem; text-align: center; }
  .gauge-label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
  #gauge-svg { display: block; margin: 0 auto; }
  .gauge-number { font-size: 2.4rem; font-weight: 700; fill: var(--green); }
  .gauge-sub { margin-top: 0.5rem; font-size: 0.85rem; color: var(--muted); }
  .gauge-count { margin-top: 1.2rem; display: flex; justify-content: space-between; font-size: 0.8rem; border-top: 1px solid var(--border); padding-top: 1rem; }
  .gauge-count .n { color: var(--green); font-weight: 700; font-size: 1rem; }
  .waveform-panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.5rem; position: relative; overflow: hidden; }
  .waveform-title { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
  #wave-svg { width: 100%; height: 140px; display: block; }
  .wave-line { fill: none; stroke: var(--green); stroke-width: 2; filter: drop-shadow(0 0 6px rgba(34,255,136,0.6)); }
  .claim-feed { margin-top: 1.5rem; max-height: 340px; overflow-y: auto; }
  .claim-row { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 0.4rem; border-bottom: 1px solid var(--border); }
  .claim-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
  .claim-icon.verified { background: rgba(34,255,136,0.15); color: var(--green); border: 1px solid var(--green); }
  .claim-icon.failed { background: rgba(255,59,92,0.15); color: var(--red); border: 1px solid var(--red); }
  .claim-text { font-size: 0.85rem; flex: 1; }
  .claim-source { font-size: 0.7rem; color: var(--muted); }
  .claim-company { font-size: 0.7rem; color: #06b6d4; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>
  <div class="header">
    <h1>🔍 HONESTY <span>POLYGRAPH</span></h1>
    <div style="color: var(--muted); font-size: 0.8rem;">every claim traced to a confirmed fact</div>
  </div>
  <div class="layout">
    <div class="gauge-panel">
      <div class="gauge-label">Integrity Score</div>
      <svg id="gauge-svg" width="220" height="140" viewBox="0 0 220 140">
        <path d="M 20 120 A 90 90 0 0 1 200 120" fill="none" stroke="#1b2430" stroke-width="14" stroke-linecap="round"/>
        <path id="gauge-arc" d="M 20 120 A 90 90 0 0 1 200 120" fill="none" stroke="#22ff88" stroke-width="14" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="283"/>
        <text x="110" y="105" text-anchor="middle" class="gauge-number" id="gauge-text">--%</text>
      </svg>
      <div class="gauge-sub">of stated claims verified against confirmed job spec</div>
      <div class="gauge-count">
        <div>Verified<br><span class="n" id="verified-count">0</span></div>
        <div>Flagged<br><span class="n" id="failed-count" style="color:var(--red)">0</span></div>
        <div>Total<br><span class="n" id="total-count">0</span></div>
      </div>
    </div>
    <div class="waveform-panel">
      <div class="waveform-title">Live Claim Verification Feed</div>
      <svg id="wave-svg" viewBox="0 0 800 140" preserveAspectRatio="none">
        <polyline id="wave-line" class="wave-line" points=""/>
      </svg>
      <div class="claim-feed" id="claim-feed"></div>
    </div>
  </div>

<script>
const TOOL_SERVER_URL = "https://puzzle-thirsty-brick.ngrok-free.dev";
let renderedClaimKeys = new Set();
let wavePoints = [];

async function poll() {
  try {
    const res = await fetch(`${TOOL_SERVER_URL}/tools/all_claims`);
    const data = await res.json();
    render(data.claims || []);
  } catch (e) { console.error("poll failed", e); }
  setTimeout(poll, 2000);
}

function render(claims) {
  const total = claims.length;
  const verified = claims.filter(c => c.verified).length;
  const failed = total - verified;
  const pct = total ? Math.round((verified / total) * 100) : 100;

  document.getElementById("total-count").textContent = total;
  document.getElementById("verified-count").textContent = verified;
  document.getElementById("failed-count").textContent = failed;
  document.getElementById("gauge-text").textContent = `${pct}%`;

  const circumference = 283;
  const offset = circumference - (pct / 100) * circumference;
  const arc = document.getElementById("gauge-arc");
  arc.style.transition = "stroke-dashoffset 0.8s ease";
  arc.setAttribute("stroke-dashoffset", offset);
  arc.setAttribute("stroke", failed > 0 ? "#ffb347" : "#22ff88");
  document.getElementById("gauge-text").setAttribute("fill", failed > 0 ? "#ffb347" : "#22ff88");

  const feed = document.getElementById("claim-feed");
  claims.forEach(c => {
    const key = `${c.company_name}_${c.claim}_${c.logged_at}`;
    if (renderedClaimKeys.has(key)) return;
    renderedClaimKeys.add(key);

    const row = document.createElement("div");
    row.className = "claim-row";
    row.innerHTML = `
      <div class="claim-icon ${c.verified ? "verified" : "failed"}">${c.verified ? "✓" : "!"}</div>
      <div style="flex:1">
        <div class="claim-text">"${c.claim}"</div>
        <div class="claim-source">↳ ${c.source_field}</div>
      </div>
      <div class="claim-company">${c.company_name}</div>
    `;
    feed.prepend(row);
    wavePoints.push(c.verified ? 70 : (Math.random() > 0.5 ? 20 : 120));
  });
  drawWave();
}

function drawWave() {
  const pts = wavePoints.slice(-60);
  const step = 800 / Math.max(pts.length - 1, 1);
  const line = pts.map((y, i) => `${i * step},${y}`).join(" ");
  document.getElementById("wave-line").setAttribute("points", line);
}
poll();
</script>
</body>
</html>
