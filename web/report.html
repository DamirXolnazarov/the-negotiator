<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Negotiator — Verdict</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0a0806; --paper: #f4ecd8; --paper-dark: #e8dcc0;
    --ink: #1a1410; --gold: #d4af37; --red-stamp: #b0231e; --muted: #8a7d68;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at 50% -10%, #2a2015 0%, #0a0806 60%);
    color: var(--paper); font-family: "JetBrains Mono", monospace;
    min-height: 100vh; padding: 3rem 2rem;
  }
  .masthead { text-align: center; margin-bottom: 2.5rem; }
  .masthead h1 {
    font-family: "Bebas Neue", sans-serif; font-size: 4rem; letter-spacing: 0.15em;
    color: var(--gold); text-shadow: 0 0 30px rgba(212,175,55,0.3);
  }
  .masthead .rule { width: 200px; height: 2px; background: var(--gold); margin: 0.5rem auto 1rem; }
  .masthead .sub { color: var(--muted); letter-spacing: 0.1em; font-size: 0.85rem; text-transform: uppercase; }
  .benchmark-strip {
    max-width: 700px; margin: 1.5rem auto 3rem; text-align: center; font-size: 0.85rem; color: var(--muted);
    border-top: 1px dashed #3a3226; border-bottom: 1px dashed #3a3226; padding: 0.8rem 0;
  }
  .arena { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.8rem; }
  .contender {
    background: linear-gradient(160deg, var(--paper) 0%, var(--paper-dark) 100%);
    color: var(--ink); border-radius: 4px; padding: 1.6rem; position: relative;
    box-shadow: 0 12px 30px rgba(0,0,0,0.5); transform: rotate(-0.6deg); transition: transform 0.3s ease;
  }
  .contender:nth-child(even) { transform: rotate(0.6deg); }
  .contender:hover { transform: rotate(0deg) scale(1.02); }
  .contender::before {
    content: ""; position: absolute; top: -8px; left: 20px; width: 40px; height: 16px;
    background: rgba(212,175,55,0.5); transform: rotate(-3deg);
  }
  .rank-badge { font-family: "Bebas Neue", sans-serif; font-size: 0.85rem; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.3rem; }
  .contender-name { font-family: "Bebas Neue", sans-serif; font-size: 1.6rem; letter-spacing: 0.03em; border-bottom: 2px solid var(--ink); padding-bottom: 0.4rem; margin-bottom: 0.8rem; }
  .persona-tag { display: inline-block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; background: var(--ink); color: var(--paper); padding: 0.15rem 0.5rem; border-radius: 2px; margin-bottom: 0.6rem; }
  .quote-amount { font-family: "Bebas Neue", sans-serif; font-size: 2.4rem; margin: 0.4rem 0; }
  .receipt { margin-top: 0.8rem; border-top: 1px dashed var(--muted); padding-top: 0.6rem; font-size: 0.75rem; }
  .receipt-line { display: flex; justify-content: space-between; padding: 0.15rem 0; color: #4a4030; }
  .winner-seal {
    position: absolute; top: -18px; right: -12px; width: 78px; height: 78px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #f5d576, var(--gold) 70%);
    display: flex; align-items: center; justify-content: center; text-align: center;
    font-family: "Bebas Neue", sans-serif; font-size: 0.7rem; letter-spacing: 0.05em; color: var(--ink);
    box-shadow: 0 6px 16px rgba(0,0,0,0.5); transform: rotate(12deg); border: 3px solid #b8912b;
  }
  .disqualified-stamp {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-18deg);
    font-family: "Bebas Neue", sans-serif; font-size: 1.7rem; letter-spacing: 0.1em; color: var(--red-stamp);
    border: 4px solid var(--red-stamp); padding: 0.3rem 1rem; border-radius: 6px; opacity: 0.85;
  }
  .contender.flagged { filter: grayscale(0.3); }
  .flag-reason { margin-top: 0.6rem; font-size: 0.7rem; color: var(--red-stamp); font-weight: 700; }
  .callback-tag, .decline-tag { font-size: 0.85rem; color: var(--muted); font-style: italic; margin: 0.6rem 0; }
  .verdict-banner {
    max-width: 700px; margin: 3.5rem auto 0; text-align: center; padding: 1.8rem;
    border: 2px solid var(--gold); border-radius: 6px; background: rgba(212,175,55,0.06);
  }
  .verdict-banner .label { font-family: "Bebas Neue", sans-serif; color: var(--gold); letter-spacing: 0.15em; font-size: 1.1rem; margin-bottom: 0.6rem; }
  .verdict-banner p { color: var(--paper); font-size: 0.9rem; line-height: 1.5; }
</style>
</head>
<body>
  <div class="masthead">
    <h1>THE VERDICT</h1>
    <div class="rule"></div>
    <div class="sub">Negotiated live · Every claim traceable · No quote invented</div>
  </div>
  <div class="benchmark-strip" id="benchmark-strip">Loading market benchmark...</div>
  <div class="arena" id="arena"></div>
  <div class="verdict-banner">
    <div class="label">⚖ FINAL RECOMMENDATION</div>
    <p id="verdict-text">Loading verdict...</p>
  </div>

<script>
const TOOL_SERVER_URL = "https://puzzle-thirsty-brick.ngrok-free.dev";
const JOB_ID = "REPLACE_WITH_JOB_ID";

async function loadReport() {
  const res = await fetch(`${TOOL_SERVER_URL}/data/report_${JOB_ID}.json`);
  const report = await res.json();
  render(report);
}

function render(report) {
  document.getElementById("benchmark-strip").textContent =
    `Market benchmark for this job: $${report.benchmark_range.low.toLocaleString()} – $${report.benchmark_range.high.toLocaleString()} (FMCSA / moveBuddha)`;

  const arena = document.getElementById("arena");
  arena.innerHTML = "";

  report.ranked_quotes.forEach((q, i) => {
    const card = document.createElement("div");
    card.className = "contender" + (q.redflag ? " flagged" : "");

    let body = "";
    if (q.outcome === "itemized_quote") {
      const items = Object.entries(q.itemized || {})
        .map(([k, v]) => `<div class="receipt-line"><span>${k}</span><span>$${v}</span></div>`)
        .join("");
      body = `<div class="quote-amount">$${q.total.toLocaleString()}</div><div class="receipt">${items}</div>`;
      if (q.redflag) {
        body += `<div class="flag-reason">⚠ ${q.reason || "Suspiciously below market."}</div>`;
      }
    } else if (q.outcome === "callback_commitment") {
      body = `<div class="callback-tag">📞 Callback scheduled: ${q.callback_time || "TBD"}</div>`;
    } else {
      body = `<div class="decline-tag">✕ Declined to quote</div>`;
    }

    card.innerHTML = `
      ${i === 0 && !q.redflag ? '<div class="winner-seal">BEST<br>DEAL</div>' : ''}
      ${q.redflag ? '<div class="disqualified-stamp">RED FLAG</div>' : ''}
      <div class="rank-badge">CONTENDER #${i + 1}</div>
      <div class="contender-name">${q.company_name}</div>
      <div class="persona-tag">${q.persona || "live call"}</div>
      ${body}
      ${q.transcript_path ? `<div style="margin-top:0.6rem;"><a href="${q.transcript_path}" style="color:#7a6a4a;font-size:0.7rem;">→ view transcript</a></div>` : ""}
    `;
    arena.appendChild(card);
  });

  document.getElementById("verdict-text").textContent = report.explanation;
}
loadReport();
</script>
</body>
</html>
